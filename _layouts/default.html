<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
</head>
<body>

  <div class="masthead-stripe"></div>

  <header class="masthead">
    <div class="masthead-inner">
      <div class="masthead-top">
        <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
        <div class="masthead-meta">
        </div>
      </div>
      <nav class="masthead-nav">
        <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>All Posts</a>
        <a href="{{ '/category/ideas/' | relative_url }}"{% if page.category == 'ideas' %} class="active"{% endif %}>Ideas</a>
        <a href="{{ '/category/life/' | relative_url }}"{% if page.category == 'life' %} class="active"{% endif %}>Life</a>
        <a href="{{ '/category/culture/' | relative_url }}"{% if page.category == 'culture' %} class="active"{% endif %}>Culture</a>
        <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} class="active"{% endif %}>About</a>
      </nav>
    </div>
  </header>

  {{ content }}

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-name">{{ site.title }}</div>
      <div class="footer-copy">© {{ 'now' | date: "%Y" }} · Life, Ideas &amp; Culture</div>
    </div>
  </footer>

</body>
</html>
